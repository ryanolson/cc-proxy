default_mode = "target"

[server]
listen_address = "0.0.0.0:3080"

[target]
# url set via --target-url (not stored here)
timeout_secs = 300
max_concurrent = 50

[passthrough]
# Used only in `compare` and `anthropic-only` modes (requires --allow-anthropic-only)
url = "https://api.anthropic.com"
timeout_secs = 300
passthrough_auth = true

[tracing]
service_name = "cc-proxy"
# otlp_endpoint = "http://localhost:4317"  # optional, omit to disable
log_level = "info"

# Local models — requests matching these model IDs route to target_url
# instead of Anthropic passthrough. Models without target_url use --target-url.
# [[models]]
# id = "glm-5-fp8"
# display_name = "GLM-5 FP8"
# target_url = "https://vvagias-glm5.stg.astra.nvidia.com"
